services:
  organizer:
    build: .
    image: jellyfin-download-organizer:dev
    container_name: jellyfin-download-organizer
    restart: unless-stopped
    ports:
      - "18328:18327"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/media1t/downloads:/media1
      - /mnt/media2t/downloads:/media2
      - ./logs:/app/logs
      - ./reports:/app/reports